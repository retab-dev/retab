# Rubocop config for the Retab Ruby SDK.
#
# The SDK is overwhelmingly auto-generated by oagen, so we don't try to police
# cosmetic style: the generator owns formatting, naming, and metrics. We only
# run the cop categories that catch real bugs (Lint, Security, Bundler,
# Gemspec) plus a few high-value Naming/Style checks that auto-generated code
# tends to satisfy already.

AllCops:
  TargetRubyVersion: 3.0
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - '.bundle/**/*'
    - 'rbi/**/*'
    - 'vendor/**/*'

# Cosmetic categories — disabled wholesale; the generator decides.
Style:
  Enabled: false
Layout:
  Enabled: false
Metrics:
  Enabled: false
Naming:
  Enabled: false

# Frozen string literal headers are emitted by the generator and present in
# the hand-maintained files too, so this is safe to keep on.
Style/FrozenStringLiteralComment:
  Enabled: true
