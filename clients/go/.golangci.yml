# golangci-lint v2 config for the Retab Go SDK.
#
# The SDK is mostly auto-generated by oagen, so we don't enable style or
# formatting cops — the generator owns those, and gofmt is enforced separately.
# We enable the high-signal bug-finding linters that catch real defects in
# generated HTTP client code: unchecked errors, unclosed response bodies,
# dead code, and the standard vet/staticcheck suites.

version: "2"

linters:
  default: none
  enable:
    - bodyclose      # HTTP response.Body must be closed
    - errcheck       # unchecked errors
    - govet          # go vet
    - ineffassign    # ineffective assignments
    - staticcheck    # bug detection (subsumes the old staticcheck binary)
    - unused         # unused identifiers
  exclusions:
    rules:
      # Tests are hand-maintained and frequently ignore errors intentionally
      # (e.g. discarding a Close error in a deferred cleanup).
      - path: _test\.go
        linters:
          - errcheck
          - bodyclose
